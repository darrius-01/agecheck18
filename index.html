<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verifica</title>
  <meta name="robots" content="noindex, nofollow" />

  <!-- Background photo: "Palazzo Montecitorio - esterno.jpg" by DellaGherardesca, CC BY 4.0
       Source: Wikimedia Commons. License: https://creativecommons.org/licenses/by/4.0/ -->
  <style>
    :root{
      --overlay: rgba(0,0,0,.55);
      --card: rgba(10,12,16,.55);
      --border: rgba(255,255,255,.16);
      --text: #fff;
      --yes: #22c55e;
      --no: #ef4444;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);

      /* Wikimedia original file URL (stable) */
      background:
        linear-gradient(var(--overlay), var(--overlay)),
        url("https://upload.wikimedia.org/wikipedia/commons/4/4a/Palazzo_Montecitorio_-_esterno.jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;

      padding: 24px;
    }

    .card{
      width: min(720px, 92vw);
      text-align:center;
      padding: 28px 22px;
      border-radius: 18px;
      background: var(--card);
      border: 1px solid var(--border);
      backdrop-filter: blur(6px);
      box-shadow: 0 20px 60px rgba(0,0,0,.45);
    }

    h1{
      margin: 0 0 18px;
      font-size: clamp(22px, 3.5vw, 40px);
      font-weight: 800;
      letter-spacing: -0.02em;
      text-shadow: 0 2px 18px rgba(0,0,0,.55);
    }

    .btns{
      display:flex;
      gap: 14px;
      justify-content:center;
      flex-wrap:wrap;
    }

    .btn{
      border:0;
      cursor:pointer;
      min-width: 160px;
      padding: 14px 22px;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 900;
      letter-spacing: .02em;
      transition: transform .08s ease, filter .15s ease;
    }
    .btn:active{ transform: translateY(1px); }
    .btn:hover{ filter: brightness(1.05); }

    .yes{ background: var(--yes); color: #05210f; }
    .no{ background: var(--no); color: #2a0606; }
  </style>
</head>
<body>
  <main class="card" role="dialog" aria-label="Verifica cittadinanza">
    <h1>Sei cittadino italiano?</h1>
    <div class="btns">
      <button class="btn yes" id="yesBtn" type="button">Sì</button>
      <button class="btn no" id="noBtn" type="button">No</button>
    </div>
  </main>

  <script>
    // Поменяй на свою ссылку (обе кнопки ведут туда же)
    const TARGET_URL = "https://sssssssssssssssssssss";

    // (Опционально) запомнить выбор на 30 дней, чтобы не показывать страницу снова
    const KEY = "it_gate_ok";
    const DAYS = 30;

    function setWithExpiry(key, value, days) {
      localStorage.setItem(key, JSON.stringify({
        value,
        expiry: Date.now() + days * 24 * 60 * 60 * 1000
      }));
    }
    function getWithExpiry(key) {
      const raw = localStorage.getItem(key);
      if (!raw) return null;
      try {
        const item = JSON.parse(raw);
        if (!item.expiry || Date.now() > item.expiry) {
          localStorage.removeItem(key);
          return null;
        }
        return item.value;
      } catch {
        localStorage.removeItem(key);
        return null;
      }
    }

    if (getWithExpiry(KEY) === "1") {
      window.location.replace(TARGET_URL);
    }

    function goNext() {
      setWithExpiry(KEY, "1", DAYS);
      window.location.href = TARGET_URL;
    }

    document.getElementById("yesBtn").addEventListener("click", goNext);
    document.getElementById("noBtn").addEventListener("click", goNext);
  </script>
</body>
</html>
